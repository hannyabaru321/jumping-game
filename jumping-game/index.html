<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Jumping Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <div class="hud">
      <div class="hud-card">
        <div class="hud-label">スコア</div>
        <div id="scoreValue" class="hud-value">0</div>
      </div>
      <div class="hud-card">
        <div class="hud-label">ハイスコア</div>
        <div id="highScoreValue" class="hud-value">0</div>
      </div>
    </div>

    <div class="game-board" id="gameBoard">
      <div id="playfield" class="playfield">
        <div id="backgroundLayerA" class="background-layer visible"></div>
        <div id="backgroundLayerB" class="background-layer"></div>
        <div id="worldLayer" class="world-layer"></div>
      </div>

      <div id="overlay" class="overlay">
        <div class="overlay-card">
          <h1 class="overlay-title">Jumping Game</h1>
          <button id="startButton" class="primary-button" type="button">スタート</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="leftButton" class="control-button" type="button">← 左へ進む</button>
      <button id="rightButton" class="control-button" type="button">右へ進む →</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
